<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="12" y1="14" x2="36" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="44" height="44" rx="12" ry="12" fill="url(#bg)"/>
  <!-- Wallet body -->
  <rect x="10" y="16" width="28" height="20" rx="3" ry="3" fill="url(#walletGrad)" opacity="0.95"/>
  <!-- Wallet flap -->
  <path d="M10 19 C10 14 10 12 14 12 L34 12 C36 12 38 13 38 16 L38 19" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Card slot -->
  <rect x="27" y="23" width="11" height="8" rx="2" ry="2" fill="#6366f1" opacity="0.8"/>
  <!-- Card dot -->
  <circle cx="32" cy="27" r="2.5" fill="#a855f7"/>
  <!-- Coin accent -->
  <circle cx="18" cy="27" r="4" fill="#fbbf24" opacity="0.9"/>
  <text x="18" y="29.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#92400e" font-family="Arial">₹</text>
</svg>